name: YNAB
options:
  bundleIdPrefix: com.ynab
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    majorVersion: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    majorVersion: "7.1.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

targets:
  YNAB:
    type: application
    platform: iOS
    sources:
      - path: Sources/YNAB
        excludes:
          - "**/*.tests.swift"
          - "Info.plist"
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseFirestore
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
    settings:
      base:
        INFOPLIST_FILE: Sources/YNAB/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ynab.app
        CODE_SIGN_STYLE: Automatic
    info:
      path: Sources/YNAB/Info.plist
      properties:
        CFBundleName: "YNAB"
        CFBundleDisplayName: "YNAB"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        NSFaceIDUsageDescription: "YNAB uses Face ID to secure your financial data."
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - com.googleusercontent.apps.187433891149-81lfef8gqaik8u4qqnnqfjlabsqi7aar

  YNABUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/YNABUITests
    dependencies:
      - target: YNAB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ynab.app.uitests
        TEST_TARGET_NAME: YNAB
        GENERATE_INFOPLIST_FILE: YES

  YNABTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/YNABTests
    dependencies:
      - target: YNAB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ynab.app.tests
        GENERATE_INFOPLIST_FILE: YES
